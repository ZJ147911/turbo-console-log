name: CI/CD for VSCode Extension

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须：允许创建Release和上传资产
      packages: write
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --max_old_space_size=4096
      NODE_NO_WARNINGS: 1
      PNPM_HOME: /home/runner/.local/share/pnpm

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置Node.js环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: false

      # 3. 安装pnpm
      - name: Install and activate pnpm
        run: |
          curl -fsSL https://get.pnpm.io/install.sh | sh -
          export PATH="$PNPM_HOME:$PATH"
          echo "$PNPM_HOME" >> $GITHUB_PATH
          echo "PNPM version: $(pnpm --version)"
          echo "PATH: $PATH"

      # 4. 配置pnpm缓存
      - name: Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      # 5. 安装依赖
      - name: Install dependencies
        run: |
          export PATH="$PNPM_HOME:$PATH"
          pnpm install --frozen-lockfile
        continue-on-error: false

      # 6. 代码格式化检查
      - name: Check code formatting
        run: |
          export PATH="$PNPM_HOME:$PATH"
          pnpm run fmt
          git diff --exit-code || (echo "❌ 代码格式不符合规范，请本地运行 pnpm run fmt 修复后再提交" && exit 1)

      # 7. 构建扩展
      - name: Build extension
        run: |
          export PATH="$PNPM_HOME:$PATH"
          pnpm run vscode:prepublish
        env:
          NODE_ENV: production

      # 8. 上传构建产物
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ github.ref_name }}
          path: out/
          retention-days: 7

      # 9. 创建VSIX包（添加详细日志）
      - name: Create VSIX package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          export PATH="$PNPM_HOME:$PATH"

          # 安装vsce并检查版本
          npm install -g vsce@latest
          echo "VSCE version: $(vsce --version)"

          # 显示当前目录文件（调试）
          echo "Current directory files:"
          ls -la

          # 显示package.json（确认名称和版本）
          cat package.json | grep -E "(name|version)"

          # 创建VSIX包（保留详细日志）
          vsce package --no-dependencies --verbose

          # 检查生成的VSIX文件（关键：确保文件存在）
          echo "Generated files after packaging:"
          ls -la *.vsix || echo "❌ No VSIX file generated!"

          # 安全捕获VSIX文件名（容错处理）
          if ls *.vsix 1> /dev/null 2>&1; then
            VSIX_FILE=$(ls *.vsix | head -n 1)
            echo "VSIX_FILE=$VSIX_FILE" >> $GITHUB_ENV
            echo "✅ Found VSIX file: $VSIX_FILE"
          else
            echo "❌ Failed to generate VSIX file!"
            exit 1
          fi

      # 10. 上传VSIX包（独立验证）
      - name: Upload VSIX artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix-${{ github.ref_name }}
          path: ${{ env.VSIX_FILE }}
          retention-days: 30

      # 11. 创建GitHub Release（修复路径问题）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # 双重保障：直接匹配VSIX文件 + 使用环境变量
          files: |
            ${{ env.VSIX_FILE }}
            *.vsix
          generate_release_notes: true
          draft: false # 直接发布，不创建草稿
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
