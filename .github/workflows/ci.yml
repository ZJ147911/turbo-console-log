name: CI/CD for VSCode Extension

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --max_old_space_size=4096
      NODE_NO_WARNINGS: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: |
          pnpm run fmt
          git diff --exit-code || (echo "❌ 代码格式不符合规范，请本地运行 pnpm run fmt 修复后再提交" && exit 1)

      - name: Lint
        run: pnpm run lint

      - name: Build extension
        run: pnpm run vscode:prepublish
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          if [ ! -d "out" ] || [ -z "$(ls -A out)" ]; then
            echo "❌ 构建失败：out 目录为空或不存在"
            exit 1
          fi
          echo "✅ 构建成功"
          ls -la out/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ github.ref_name }}
          path: out/
          retention-days: 7

      - name: Create VSIX package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pnpm add -g @vscode/vsce
          vsce package --no-dependencies
          if ls *.vsix 1>/dev/null 2>&1; then
            VSIX_FILE=$(ls *.vsix | head -n 1)
            echo "VSIX_FILE=$VSIX_FILE" >> $GITHUB_ENV
            echo "✅ VSIX: $VSIX_FILE"
          else
            echo "❌ 未生成 VSIX 文件"
            exit 1
          fi

      - name: Upload VSIX artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix-${{ github.ref_name }}
          path: ${{ env.VSIX_FILE }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_FILE }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
