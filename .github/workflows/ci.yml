# CI配置文件 - GitHub Actions
# 自动化构建和打包流程

name: CI

# 触发条件
on:
  # 只在推送版本tag时触发（格式：v*.*.*）
  push:
    tags:
      - v*.*.*

# 作业定义
jobs:
  build:
    # 使用最新的Ubuntu环境
    runs-on: ubuntu-latest

    # 环境变量
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # 构建步骤
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4

      # 2. 设置Node.js环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 使用Node.js 22版本
          cache: 'pnpm' # 缓存pnpm依赖

      # 3. 安装pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 5. 构建扩展
      - name: Build extension
        run: pnpm run vscode:prepublish # 运行预发布构建命令

      # 6. 运行代码格式化
      - name: Run formatter
        run: pnpm run fmt # 运行oxfmt进行代码格式化

      # 7. 检查代码格式是否正确
      - name: Check formatting
        run: git diff --exit-code # 确保格式化后的代码没有变更

      # 8. 上传构建产物作为artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: out/ # 上传out目录中的构建产物

      # 9. 创建VSIX包（仅在推送tag时执行）
      - name: Create VSIX package
        if: startsWith(github.ref, 'refs/tags/') # 条件：只在推送tag时执行
        run: |
          npm install -g vsce  # 全局安装vsce工具
          vsce package         # 创建VSIX包

      # 10. 上传VSIX包作为artifacts（仅在推送tag时执行）
      - name: Upload VSIX artifact
        if: startsWith(github.ref, 'refs/tags/') # 条件：只在推送tag时执行
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: '*.vsix' # 上传生成的VSIX包
