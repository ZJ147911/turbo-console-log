# CI配置文件 - GitHub Actions
# 自动化构建和打包流程

name: CI

# 触发条件
on:
  # 只在推送版本tag时触发（格式：v*.*.*）
  push:
    tags:
      - v*.*.*
    branches:
      - master
      - develop

# 作业定义
jobs:
  build:
    # 使用最新的Ubuntu环境
    runs-on: ubuntu-latest

    # 环境变量
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # 构建步骤
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4

      # 2. 设置 Node.js 环境（npm 已预装在 GitHub Actions 中）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 使用 Node.js 22 版本
          cache: 'npm' # 缓存 npm 依赖

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建扩展
      - name: Build extension
        run: npm run vscode:prepublish # 运行预发布构建命令

      # 5. 运行代码格式化
      - name: Run formatter
        run: npm run fmt # 运行 oxfmt 进行代码格式化

      # 6. 检查代码格式是否正确
      - name: Check formatting
        run: git diff --exit-code # 确保格式化后的代码没有变更

      # 7. 上传构建产物作为 artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: out/ # 上传 out 目录中的构建产物

      # 8. 创建 VSIX 包（仅在推送 tag 时执行）
      - name: Create VSIX package
        if: startsWith(github.ref, 'refs/tags/') # 条件：只在推送 tag 时执行
        run: |
          npm install -g vsce  # 全局安装 vsce 工具
          vsce package         # 创建 VSIX 包

      # 9. 上传 VSIX 包作为 artifacts（仅在推送 tag 时执行）
      - name: Upload VSIX artifact
        if: startsWith(github.ref, 'refs/tags/') # 条件：只在推送 tag 时执行
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: '*.vsix' # 上传生成的 VSIX 包
