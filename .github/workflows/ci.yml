# CI配置文件 - GitHub Actions
# 自动化构建和打包流程

name: CI

# 触发条件
on:
  # 只在推送版本 tag 时触发（格式：v*.*.*）
  push:
    tags:
      - v*.*.*

# 作业定义
jobs:
  build:
    # 使用最新的 Ubuntu 环境
    runs-on: ubuntu-latest

    # 环境变量
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # 构建步骤
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 使用 Node.js 22 版本
          cache: 'pnpm' # 缓存 pnpm 依赖

      # 3. 安装 pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 5. 构建扩展
      - name: Build extension
        run: pnpm run vscode:prepublish # 运行预发布构建命令

      # 6. 运行代码格式化
      - name: Run formatter
        run: pnpm run fmt # 运行 oxfmt 进行代码格式化

      # 7. 检查代码格式是否正确
      - name: Check formatting
        run: git diff --exit-code # 确保格式化后的代码没有变更

      # 8. 创建 VSIX 包（仅在推送 tag 时执行）
      - name: Create VSIX package
        if: startsWith(github.ref, 'refs/tags/') # 条件：只在推送 tag 时执行
        run: |
          npm install -g @vscode/vsce  # 全局安装 vsce 工具
          vsce package                 # 创建 VSIX 包

      # 9. 发布到 GitHub Release（仅在推送 tag 时执行）
      - name: Release to GitHub
        if: startsWith(github.ref, 'refs/tags/') # 条件：只在推送 tag 时执行
        uses: softprops/action-gh-release@v1
        with:
          files: '*.vsix' # 上传 VSIX 包到 Release
          generate_release_notes: true # 自动生成发布说明
          draft: false # 直接发布，不设为草稿
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 使用 GitHub 提供的认证令牌
