name: CI/CD for VSCode Extension

on:
  push:
    tags:
      - v*.*.*
    branches:
      - master
  workflow_dispatch: # 允许手动触发测试

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --max_old_space_size=4096
      NODE_NO_WARNINGS: 1 # 关闭 punycode 弃用警告

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置Node.js环境（先不配置pnpm缓存）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # 暂时移除pnpm缓存配置，先安装pnpm
          check-latest: false

      # 3. 手动安装pnpm（关键修复）
      - name: Install pnpm manually
        run: |
          # 手动下载并安装pnpm，确保PATH中能找到
          curl -fsSL https://get.pnpm.io/install.sh | sh -
          # 将pnpm添加到PATH
          echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH
          echo "$HOME/.pnpm-store" >> $GITHUB_PATH
          # 验证pnpm安装
          pnpm --version

      # 4. 重新设置缓存（现在pnpm已安装）
      - name: Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      # 5. 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: false

      # 6. 代码格式化检查
      - name: Check code formatting
        run: |
          pnpm run fmt
          git diff --exit-code || (echo "❌ 代码格式不符合规范，请本地运行 pnpm run fmt 修复后再提交" && exit 1)

      # 7. 构建扩展
      - name: Build extension
        run: pnpm run vscode:prepublish
        env:
          NODE_ENV: production

      # 8. 上传构建产物
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ github.ref_name }}
          path: out/
          retention-days: 7

      # 9. 创建VSIX包（仅在推送tag时执行）
      - name: Create VSIX package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npm install -g vsce@latest
          vsce package --no-dependencies
          echo "VSIX_FILE=$(ls *.vsix)" >> $GITHUB_ENV

      # 10. 上传VSIX包（仅在推送tag时执行）
      - name: Upload VSIX artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix-${{ github.ref_name }}
          path: ${{ env.VSIX_FILE }}
          retention-days: 30

      # 11. 创建GitHub Release（仅在推送tag时执行）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_FILE }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
