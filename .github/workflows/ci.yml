name: CI/CD for VSCode Extension

on:
  push:
    tags:
      - v*.*.*
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --max_old_space_size=4096
      NODE_NO_WARNINGS: 1
      PNPM_HOME: /home/runner/.local/share/pnpm # 显式指定pnpm路径

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置Node.js环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: false

      # 3. 安装pnpm（核心修复：立即生效PATH）
      - name: Install and activate pnpm
        run: |
          # 安装pnpm
          curl -fsSL https://get.pnpm.io/install.sh | sh -

          # 立即将pnpm添加到当前会话的PATH（关键修复）
          export PATH="$PNPM_HOME:$PATH"

          # 将pnpm路径写入GITHUB_PATH，供后续步骤使用
          echo "$PNPM_HOME" >> $GITHUB_PATH

          # 验证pnpm安装
          echo "PNPM version: $(pnpm --version)"
          echo "PATH: $PATH"

      # 4. 配置pnpm缓存
      - name: Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      # 5. 安装依赖
      - name: Install dependencies
        run: |
          # 再次确认PATH
          export PATH="$PNPM_HOME:$PATH"
          pnpm install --frozen-lockfile
        continue-on-error: false

      # 6. 代码格式化检查
      - name: Check code formatting
        run: |
          export PATH="$PNPM_HOME:$PATH"
          pnpm run fmt
          git diff --exit-code || (echo "❌ 代码格式不符合规范，请本地运行 pnpm run fmt 修复后再提交" && exit 1)

      # 7. 构建扩展
      - name: Build extension
        run: |
          export PATH="$PNPM_HOME:$PATH"
          pnpm run vscode:prepublish
        env:
          NODE_ENV: production

      # 8. 上传构建产物
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ github.ref_name }}
          path: out/
          retention-days: 7

      # 9. 创建VSIX包（仅在推送tag时执行）
      - name: Create VSIX package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          export PATH="$PNPM_HOME:$PATH"
          npm install -g vsce@latest
          vsce package --no-dependencies
          echo "VSIX_FILE=$(ls *.vsix)" >> $GITHUB_ENV

      # 10. 上传VSIX包（仅在推送tag时执行）
      - name: Upload VSIX artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix-${{ github.ref_name }}
          path: ${{ env.VSIX_FILE }}
          retention-days: 30

      # 11. 创建GitHub Release（仅在推送tag时执行）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_FILE }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
